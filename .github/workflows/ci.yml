name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate commit scopes
        if: github.event_name == 'pull_request'
        run: npm run validate:commit-scopes -- origin/${{ github.base_ref }} HEAD

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
